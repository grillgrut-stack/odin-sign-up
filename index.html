<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="left">
        <div id="odinDiv">
            <img id="odin" src="img/odin-lined.png">
            <div>Odin</div>
        </div>
            <div class="credit">Photo by <a class="cred" href="https://unsplash.com/photos/view-of-floating-open-book-from-stacked-books-in-library-HH4WBGNyltc">Jaredd Craig</a>
            on <a class="cred" href="https://unsplash.com/">Unsplash</a></div>
            <img src="img/jaredd.jpg" alt="A picture of books making a circle and a book in the middle floating, whilst open" height="100%" width="100%">
    </div>

    <div id="right">

        <div id="top">
            This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. 
            <br>
            Sign up <em>now</em> to get started.
            <br>
            <br>
            You <em>know</em> you want to.
        </div>

        <div id="form">
            <div id="formHead">Let's do this!</div>
            <form id="realForm">
                <div>
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName">
                    <br>
                    <label for="userMail">Email:</label>
                    <input type="email" id="userMail">
                    <br>
                    <label for="userPass">Password:</label>
                    <input type="password" id="userPass">
                </div>

                <div>
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName">
                    <br>
                    <label for="userNum">Phone Number</label>
                    <input type="number" id="userNum">
                    <br>
                    <label for="confirmPass">Confirm Password</label>
                    <input type="password" id="confirmPass">
                </div>
            </form>
        </div>

        <div id="bottom">
            <button>Create Account</button>
            <div id="already">Already have an account? Log in</div>
        </div>

    </div>
</body>
</html>
